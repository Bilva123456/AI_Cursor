{% extends "base.html" %}

{% block title %}404 Not Found{% endblock %}

{% block content %}
<div class="text-center py-5">
    <i class="bi bi-exclamation-triangle" style="font-size: 64px; color: #dc3545;"></i>
    <h1 class="mt-4">Page Not Found</h1>
    <p class="lead text-muted">The page you're looking for doesn't exist.</p>
    
    <div class="mt-4">
        <a href="{{ url_for('dashboard') if 'user_id' in session else url_for('index') }}" class="btn btn-primary">
            <i class="bi bi-house"></i> Go Home
        </a>
        <a href="javascript:history.back()" class="btn btn-outline-primary">
            <i class="bi bi-arrow-left"></i> Go Back
        </a>
    </div>
</div>
{% endblock %}
