{% extends "base.html" %}

{% block title %}500 Server Error{% endblock %}

{% block content %}
<div class="text-center py-5">
    <i class="bi bi-exclamation-octagon" style="font-size: 64px; color: #dc3545;"></i>
    <h1 class="mt-4">Server Error</h1>
    <p class="lead text-muted">Something went wrong on our end. Please try again later.</p>
    
    <div class="mt-4">
        <a href="{{ url_for('dashboard') if 'user_id' in session else url_for('index') }}" class="btn btn-primary">
            <i class="bi bi-house"></i> Go Home
        </a>
        <a href="javascript:history.back()" class="btn btn-outline-primary">
            <i class="bi bi-arrow-left"></i> Go Back
        </a>
    </div>
</div>
{% endblock %}
